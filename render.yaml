services:
  - type: web
    name: nivine-voice-server
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        value: https://nivine.vercel.app
      - key: CORS_ORIGIN
        value: https://nivine.vercel.app
      - key: VERCEL_FRONTEND_URL
        value: https://nivine.vercel.app
      - key: SOCKET_IO_PATH
        value: /socket.io
